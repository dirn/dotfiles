- name: Install
  homebrew: name={{ item }} state=present
  with_items:
    - pyenv
    - pyenv-virtualenv
    - pyenv-virtualenvwrapper

- name: Configure virtualenvwrapper
  lineinfile: >
    dest={{ rc_file }}
    state=present
    create=yes
    line="{{ item }}"
  with_items:
    - export WORKON_HOME=\"$HOME/.virtualenvs\"
    - export PROJECT_HOME=\"$HOME/development\"

- name: Source pyenv
  lineinfile: >
    dest={{ rc_file }}
    state=present
    create=yes
    line="{{ item }}"
  with_items:
    - if which pyenv > /dev/null; then
    - "    export PYENV_ROOT=\\\"$HOME/.pyenv\\\""
    - "    export PATH=\\\"$PYENV_ROOT/bin:$PATH\\\""
    - "    eval \\\"$(pyenv init -)\\\""
    - "    pyenv virtualenvwrapper_lazy"
    - "fi # pyenv"

- include: pyenv/version.yml version={{ python_26 }}
- include: pyenv/version.yml version={{ python_27 }}
- include: pyenv/version.yml version={{ python_33 }}
- include: pyenv/version.yml version={{ python_34 }}
- include: pyenv/version.yml version={{ pypy }}
- include: pyenv/version.yml version={{ pypy3 }}

- include: pyenv/versions.yml dest={{ pyenv }}/version versions={{ [python_27, python_34, python_26, python_33, pypy, pypy3] }}
- include: pyenv/versions.yml dest=~/.python-version versions={{ [python_34, python_27, python_26, python_33, pypy, pypy3] }}

- include: venv.yml name=devpi bin=devpi-server

- name: Start devpi
  command: ~/.local/bin/devpi-server --start
  register: devpi
  changed_when: devpi.stdout.startswith('starting background')

- name: Configure pip to use devpi
  lineinfile: >
    dest=~/.pip/pip.conf
    state=present
    create=yes
    line="{{ item }}"
  with_items:
    - "[global]"
    - index-url = http://localhost:3141/root/pypi/+simple/

- include: venv.yml name=bpython
- include: venv.yml name=twine

- include: pyenv/pip.yml version={{ python_version }} name=bpython
- include: pyenv/pip.yml version={{ python_xp_version }} name=bpython

- include: pyenv/pip.yml version={{ python_version }} name=flake8-docstrings
- include: pyenv/pip.yml version={{ python_xp_version }} name=flake8-docstrings

- include: pyenv/pip.yml version={{ python_version }} name=pip
- include: pyenv/pip.yml version={{ python_xp_version }} name=pip

- include: pyenv/pip.yml version={{ python_version }} name=setuptools
- include: pyenv/pip.yml version={{ python_xp_version }} name=setuptools

- name: Configure virtualenvwrapper installs
  lineinfile: >
    dest=~/.virtualenvs/postmkvirtualenv
    state=present
    create=yes
    mode=0775
    line="{{ item }}"
  with_items:
    - "#!/bin/zsh"
    - pip install bpython
    - pip install flake8-docstrings
