---
# The following variables are available in all plays:
#
#   - ansible: The directory where ansible will store things.
#   - dotfiles: The local of the dotfiles repository.
#   - home: The user's home directory.
#   - homebrew: Homebrew's prefix. This will not be available until after Homebrew has been installed.
#   - local: The .local directory.
#   - rc_file: The run commands file that should be updated.

- name: Register facts
  hosts: localhost
  # Facts are needed for ansible_env.
  gather_facts: yes
  tags: always

  tasks:
    - name: Set global facts
      set_fact:
        ansible: "{{ ansible_env.HOME }}/.ansible"
        home: "{{ ansible_env.HOME }}"
        local: "{{ ansible_env.HOME }}/.local"
        rc_file: "{{ ansible_env.HOME }}/.extra"

    - name: Set global facts that depend on other global facts
      set_fact:
        dotfiles: "{{ ansible }}/dotfiles"

- name: Initialize environment
  hosts: localhost
  gather_facts: no
  tags: initialize

  tasks:
    - name: Ensure the Ansible directory exists
      file:
        path: "{{ ansible }}"
        state: directory

    - name: Ensure the local bin directory exists
      file:
        path: "{{ local }}/bin"
        state: directory

    - name: Download dotfiles
      git:
        repo: git@github.com:dirn/dotfiles.git
        dest: "{{ dotfiles }}"
        force: no
      ignore_errors: yes
      tags:
        - dotfiles

    - name: Download color schemes
      git:
        repo: git@github.com:{{ item.src }}.git
        dest: "{{ ansible }}/colorschemes/{{ item.dest }}"
      with_items:
        - src: chriskempson/base16-iterm2
          dest: base16-iterm2

    - name: Add an alias to run this playbook
      lineinfile:
        dest: "{{ rc_file }}"
        state: present
        create: yes
        line: alias play="ansible-playbook --ask-sudo-pass --inventory-file localhost, --connection=local {{ dotfiles }}/playbook.yml"
      tags:
        - dotfiles

- name: Configure OS X
  hosts: localhost
  gather_facts: no
  tags: osx

  vars:
    config:
      dock:
        # Dock: dim hidden apps
        - domain: com.apple.dock
          key: showhidden
        # Dock: icon size
        - domain: com.apple.dock
          key: tilesize
          type: int
          value: '42'
        # Dock: position
        - domain: com.apple.dock
          key: orientation
          type: string
          value: left
      finder:
        # Finder: empty Trash securely
        - domain: com.apple.finder
          key: EmptyTrashSecurely
      menubar:
        # Menu bar: show battery percentage
        - domain: com.apple.menuextra.battery
          key: ShowPercent
        # Menu bar: show date and time
        - domain: com.apple.menuextra.clock
          key: DateFormat
          type: string
          value: "EEE MMM d  h:mm a"
      misc:
        # enable natural scrolling
        - domain: NSGlobalDomain
          key: com.apple.swipescrolldirection
        # Universal Access: use Ctrl (^) key to zoom
        - domain: com.apple.universalaccess
          key: HIDScrollZoomModifierMask
          type: int
          value: '262144'
        - domain: com.apple.universalaccess
          key: closeViewScrollWheelToggle

  handlers:
    - name: Restart Dock
      command: killall Dock

    - name: Restart Finder
      command: killall Finder

    - name: Restart Menubar
      command: killall SystemUIServer

  tasks:
    - name: Check the Dock configuration
      command: defaults read {{ item.domain }} {{ item.key }}
      register: dock
      changed_when: dock.stdout != item.value|default('1')
      ignore_errors: yes
      with_items: "{{ config.dock }}"

    - name: Configure the Dock
      command: defaults write {{ item.domain }} {{ item.key }} -{{ item.type|default('bool') }} {{ item.value|default('YES') }}
      when: dock.changed
      with_items: "{{ config.dock }}"
      notify: Restart Dock

    - name: Check the Finder configuration
      command: defaults read {{ item.domain }} {{ item.key }}
      register: finder
      changed_when: finder.stdout != item.value|default('1')
      ignore_errors: yes
      with_items: "{{ config.finder }}"

    - name: Configure Finder
      command: defaults write {{ item.domain }} {{ item.key }} -{{ item.type|default('bool') }} {{ item.value|default('YES') }}
      when: finder.changed
      with_items: "{{ config.finder }}"
      notify: Restart Finder

    - name: Check the Menu bar configuration
      command: defaults read {{ item.domain }} {{ item.key }}
      register: menubar
      changed_when: menubar.stdout != item.value|default('1')
      ignore_errors: yes
      with_items: "{{ config.menubar }}"

    - name: Configure the Menu bar
      command: defaults write {{ item.domain }} {{ item.key }} -{{ item.type|default('bool') }} {{ item.value|default('YES') }}
      when: menubar.changed
      with_items: "{{ config.menubar }}"
      notify: Restart Menubar

    - name: Check the OS X configuration
      command: defaults read {{ item.domain }} {{ item.key }}
      register: misc
      changed_when: misc.stdout != item.value|default('1')
      ignore_errors: yes
      with_items: "{{ config.misc }}"

    - name: Configure OS X
      command: defaults write {{ item.domain }} {{ item.key }} -{{ item.type|default('bool') }} {{ item.value|default('YES') }}
      when: misc.changed
      with_items: "{{ config.misc }}"

- name: Install Homebrew
  hosts: localhost
  gather_facts: no
  tags: homebrew

  tasks:
    - name: Check for current installation
      command: which brew
      register: homebrew
      ignore_errors: yes
      changed_when: homebrew|failed

    - name: Set Homebrew facts
      set_fact:
        has_homebrew: "{{ not homebrew|failed }}"

    - name: Download installer
      git:
        repo: git@github.com:Homebrew/install.git
        dest: /tmp/homebrew-installer
      when: not has_homebrew

    - name: Install Homebrew
      command: creates=/usr/local/bin/brew /tmp/homebrew-installer/install
      when: not has_homebrew

    - name: Install Homebrew taps for Homebrew Cask
      homebrew_tap:
        name: caskroom/{{ item }}
        state: present
      with_items:
        - cask
        - fonts


    - name: Configure Homebrew Cask
      lineinfile:
        dest: "{{ rc_file }}"
        state: present
        create: yes
        line: export HOMEBREW_CASK_OPTS="--appdir=/Applications"

- name: Set facts
  hosts: localhost
  gather_facts: no
  tags: always

  tasks:
    - name: Set Homebrew facts that depend on Homebrew
      set_fact:
        homebrew: "{{ lookup('pipe', 'brew --prefix') }}"

- name: Update Homebrew
  hosts: localhost
  gather_facts: no
  tags: always

  tasks:
    - name: Update Homebrew
      homebrew:
        update_homebrew: yes
      register: update

- name: Install Homebrew packages
  hosts: localhost
  gather_facts: no
  tags: homebrew

  tasks:
    - name: Install libraries
      homebrew:
        name: "{{ item }}"
        state: latest
      with_items:
        - aspell
        - ctags
        - go
        - keybase
        - mercurial
        - openssl
        - readline
        - the_silver_searcher
        - tree
        - wget
      when: update|changed

    - name: Install Homebrew Cask libraries
      homebrew_cask:
        name: "{{ item }}"
        state: present
      with_items:
        - alfred
        - appzapper
        - dropbox
        - font-fira-mono-for-powerline
        - flux
        - hipchat
        - iterm2
        - kaleidoscope
        - mac2imgur
        - parallels-desktop
        - send-to-kindle
        - skitch
        - slack
        - transmit
        - tunnelblick
        - vmware-fusion
        - xquartz
      when: update|changed

    - name: Install Homebrew Cask libraries with sudo
      become: yes
      homebrew_cask:
        name: "{{ item }}"
        state: present
      with_items:
        - seil

    - name: Install Homebrew Cask apps that might fail
      homebrew_cask:
        name: "{{ item }}"
        state: present
      ignore_errors: yes
      with_items:
        - virtualbox # If VirtualBox is installed and running, it will fail.
      tags: osx

- name: Zsh
  hosts: localhost
  gather_facts: no
  tags: zsh

  tasks:
    - name: Install Zsh
      homebrew:
        name: zsh
        state: latest

    - name: Add Zsh to available shells
      become: yes
      lineinfile:
        dest: /etc/shells
        line: "{{ homebrew }}/bin/zsh"
        state: present

    - name: Make Zsh the default shell
      shell: chsh -s "{{ homebrew }}/bin/zsh"
      register: zsh
      when: "'{{ lookup('pipe', 'dscl . -read ' + ansible_env.HOME + ' UserShell') }}' != 'UserShell: {{ homebrew }}/bin/zsh'"

    - name: Install Prezto
      git:
        repo: git@github.com:sorin-ionescu/prezto.git
        dest: "{{ ansible_env.HOME }}/.zprezto"

    - name: Link Prezto's dotfiles
      file:
        src: "{{ ansible_env.HOME }}/.zprezto/runcoms/{{ item }}"
        dest: "{{ ansible_env.HOME }}/.{{ item }}"
        state: link
        force: yes
      with_items:
        - zlogin
        - zlogout
        - zprofile
        - zshenv
      tags:
        - dotfiles

    - name: Link dotfiles
      file:
        src: "{{ dotfiles }}/zsh/{{ item }}"
        dest: "{{ home }}/.{{ item }}"
        state: link
        force: yes
      with_items:
        - zpreztorc
        - zshrc
        - aliases
        - exports
        - functions
      tags:
        - dotfiles

- name: z
  hosts: localhost
  gather_facts: no
  tags: z

  tasks:
    - name: Install z
      homebrew:
        name: z
        state: latest

    - name: Use z
      lineinfile:
        dest: "{{ rc_file }}"
        state: present
        create: yes
        line: source $(brew --prefix)/etc/profile.d/z.sh
      tags:
        - dotfiles

- name: Docker
  hosts: localhost
  gather_facts: no
  tags: docker

  tasks:
    - name: Install Docker
      homebrew:
        name: "{{ item }}"
        state: latest
      with_items:
        - docker
        - docker-compose
        - docker-machine

- name: Git
  hosts: localhost
  gather_facts: no
  tags: git

  tasks:
    - name: Install Git
      homebrew:
        name: "{{ item }}"
        state: latest
      with_items:
        - git
        - hub

    - name: Use hub
      lineinfile:
        dest: "{{ rc_file }}"
        state: present
        create: yes
        line: eval "$(hub alias -s)"
      tags:
        - dotfiles

    - name: Use diff-highlight
      file:
        src: "{{ homebrew }}/share/git-core/contrib/diff-highlight/diff-highlight"
        dest: "{{ local }}/bin/diff-highlight"
        state: link
        force: yes

    - name: Link dotfiles
      file:
        src: "{{ dotfiles }}/git/{{ item.src }}"
        dest: "{{ home }}/.{{ item.dest }}"
        state: link
        force: yes
      with_items:
        - src: gitconfig
          dest: gitconfig
        - src: gitignore
          dest: gitignoreglobal
      tags:
        - dotfiles

- name: Set Python facts
  hosts: localhost
  gather_facts: no
  tags: python

  tasks:
    - name: Set Python facts
      set_fact:
        pyenv: "{{ home }}/.pyenv"
        pyenv_versions:
          global: [2.7.11, 3.5.1, 3.4.4, 3.3.6, pypy-5.1]
          local: [3.5.1, 3.4.4, 2.7.11, 3.3.6, pypy-5.1]
        python_version: 3.5.1
        python_xp_version: 2.7.11

    - name: Set Python facts that depend on other Python facts
      set_fact:
        python_versions: "{{ pyenv_versions.global|union(pyenv_versions.local) }}"
        venv: "{{ pyenv }}/versions/{{ python_version }}/bin/pyvenv"

- name: Python
  hosts: localhost
  gather_facts: no
  tags: python

  tasks:
    - name: Install Python
      homebrew:
        name: "{{ item }}"
        state: latest
      with_items:
        - pyenv
        - pyenv-virtualenv
        - pyenv-virtualenvwrapper

    - name: Install Python versions
      command: creates="{{ pyenv }}/versions/{{ item }}" pyenv install {{ item }}
      with_items: "{{ python_versions }}"

    - name: Configure virtualenvwrapper
      lineinfile:
        dest: "{{ rc_file }}"
        state: present
        create: yes
        line: "{{ item }}"
      with_items:
        - export WORKON_HOME="$HOME/.virtualenvs"
        - export PROJECT_HOME="$HOME/development"
      tags:
        - dotfiles

    - name: Configure virtualenvwrapper to initialize new environments
      lineinfile:
        dest: "{{ home }}/.virtualenvs/postmkvirtualenv"
        state: present
        create: yes
        mode: 0755
        line: "{{ item }}"
      with_items:
        - "#!/bin/zsh"
        - python -m pip install bpython flake8-docstrings neovim pip-tools wheel

    - name: Use pyenv
      lineinfile:
        dest: "{{ rc_file }}"
        state: present
        create: yes
        line: "{{ item }}"
      with_items:
        - if which pyenv > /dev/null; then
        - '    export PYENV_ROOT="$HOME/.pyenv"'
        - '    export PATH="$PYENV_ROOT/bin:$PATH"'
        - '    eval "$(pyenv init -)"'
        - '    pyenv virtualenvwrapper_lazy'
        - 'fi # pyenv'
      tags:
        - dotfiles

    - name: Check global Python versions
      command: cat {{ pyenv }}/version
      register: current_pyenv_versions
      changed_when: false

    - name: Set global Python versions
      command: pyenv global {{ ' '.join(pyenv_versions.global) }}
      when: current_pyenv_versions.stdout_lines != pyenv_versions.global

    - name: Check global Python versions
      command: cat {{ home }}/.python-version
      register: current_pyenv_versions
      changed_when: false

    - name: Set local Python versions
      command: chdir={{ home }} pyenv local {{ ' '.join(pyenv_versions.local) }}
      when: current_pyenv_versions.stdout_lines != pyenv_versions.local

- name: Install global Python libraries
  hosts: localhost
  gather_facts: no
  tags: python

  vars:
    global_libraries:
      - venv: ansible
        executables:
          - ansible
          - ansible-galaxy
          - ansible-playbook
          - ansible-vault
      - venv: bpython
        executables:
          - bpython
        pyvenv: "{{ pyenv }}/versions/{{ python_version }}/bin/pyvenv"
      - venv: hovercraft
        executables:
          - hovercraft
        pyvenv: "{{ pyenv }}/versions/{{ python_version }}/bin/pyvenv"
      - venv: pip-tools
        executables:
          - pip-compile
          - pip-sync
        pyvenv: "{{ pyenv }}/versions/{{ python_version }}/bin/pyvenv"
      - venv: sphinx
        executables:
          - sphinx-build
          - sphinx-quickstart
        pyvenv: "{{ pyenv }}/versions/{{ python_version }}/bin/pyvenv"
      - venv: twine
        executables:
          - twine
        pyvenv: "{{ pyenv }}/versions/{{ python_version }}/bin/pyvenv"
      - venv: wheel
        executables:
          - wheel
        pyvenv: "{{ pyenv }}/versions/{{ python_version }}/bin/pyvenv"
    libraries:
      - bpython
      - flake8-docstrings
      - neovim
      - pip
      - pip-tools
      - setuptools

  tasks:
    - name: Install libraries
      pip:
        name: "{{ item.venv }}"
        state: latest
        virtualenv: "{{ local }}/venvs/{{ item.venv }}"
        virtualenv_command: "{{ item.pyvenv|default('virtualenv') }}"
      with_items: "{{ global_libraries }}"

    - name: Link executables
      file:
        src: "{{ local }}/venvs/{{ item.0.venv }}/bin/{{ item.1|default(item.0.venv) }}"
        dest: "{{ local }}/bin/{{ item.1|default(item.0.venv) }}"
        state: link
        force: yes
      with_subelements:
        - "{{ global_libraries }}"
        - executables

    - name: Install pip libraries
      pip:
        name: "{{ item.0 }}"
        executable: "{{ pyenv }}/versions/{{ item.1 }}/bin/pip"
        state: latest
      with_nested:
        - "{{ libraries }}"
        - "{{ python_versions }}"

- name: Set Ruby facts
  hosts: localhost
  gather_facts: no
  tags: ruby

  tasks:
    - name: Set Ruby facts
      set_fact:
        rbenv: "{{ home }}/.rbenv"
        ruby_version: 2.2.0
        ruby_versions:
          - 2.0.0-p598
          - 2.1.7
          - 2.2.3

- name: Ruby
  hosts: localhost
  gather_facts: no
  tags: ruby

  vars:
    libraries:
      - lunchy
      # This is needed by WeeChat.
      - terminal-notifier
      - travis
      - weechat

  tasks:
    - name: Install Ruby
      homebrew:
        name: "{{ item }}"
        state: latest
      with_items:
        - rbenv
        - ruby-build

    - name: Use rbenv
      lineinfile:
        dest: "{{ rc_file }}"
        state: present
        create: yes
        line: if which rbenv > /dev/null; then eval "$(rbenv init -)"; fi
      tags:
        - dotfiles

    - name: Install Ruby versions
      command: creates="{{ rbenv }}/versions/{{ item }}" rbenv install {{ item }}
      with_items: "{{ ruby_versions }}"

    - name: Check global Ruby version
      command: cat {{ rbenv }}/version
      register: current_rbenv_version
      changed_when: false

    - name: Set global Ruby version
      command: rbenv global {{ ruby_version }}
      when: current_rbenv_version.stdout != ruby_version

    - name: Install gems
      gem:
        name: "{{ item.0 }}"
        executable: "{{ rbenv }}/versions/{{ item.1 }}/bin/gem"
        state: latest
      with_nested:
        - "{{ libraries }}"
        - "{{ ruby_versions }}"

    - name: Use Travis CI
      lineinfile:
        dest: "{{ rc_file }}"
        state: present
        create: yes
        line: "[ -f {{ home }}.travis/travis.sh ] && source {{ home }}.travis/travis.sh"

- name: Postgres
  hosts: localhost
  gather_facts: no
  tags: postgres

  tasks:
    - name: Install Postgres
      homebrew:
        name: postgresql
        state: latest

    - name: Link dotfiles
      file:
        src: "{{ dotfiles }}/postgresql/{{ item }}"
        dest: "{{ home }}/.{{ item }}"
        state: link
        force: yes
      with_items:
        - psqlrc
      tags:
        - dotfiles

- name: Vim
  hosts: localhost
  gather_facts: no
  tags: vim

  tasks:
    - name: Install Homebrew tap for NeoVim
      homebrew_tap:
        tap: neovim/neovim
        state: present

    - name: Install Vim
      homebrew:
        name: "{{ item }}"
        state: latest
        install_options: with-python3,without-python
      with_items:
        - vim
        - macvim

    - name: Install NeoVim
      homebrew:
        name: neovim
        state: latest

    # The neovim Pip library is installed in a Python play.

    - name: Install NeoBundle
      git:
        repo: git@github.com:shougo/neobundle.vim.git
        dest: "{{ home }}/.vim/bundle/neobundle.vim"
        update: no

    - name: Link dotfiles
      file:
        src: "{{ dotfiles }}/vim/{{ item.src }}"
        dest: "{{ home }}/.{{ item.dest }}"
        state: link
        force: yes
      with_items:
        - src: vimrc
          dest: vimrc
        - src: ftplugin
          dest: vim/ftplugin
      tags:
        - dotfiles

    - name: Link NeoVim's dotfiles
      file:
        src: "{{ home }}/{{ item.src }}"
        dest: "{{ home }}/.{{ item.dest }}"
        state: link
        force: yes
      with_items:
        - src: .vim
          dest: config/nvim
        - src: .vimrc
          dest: config/nvim/init.vim

    - name: Make Vim the default editor
      lineinfile:
        dest: "{{ rc_file }}"
        state: present
        create: yes
        line: export EDITOR="vim"

- name: Tmux
  hosts: localhost
  gather_facts: no
  tags: tmux

  tasks:
    - name: Install Tmux
      homebrew:
        name: "{{ item }}"
        state: latest
      with_items:
        - tmux
        - reattach-to-user-namespace

    - name: Install Tmux Plugin Manager
      git:
        repo: git@github.com:tmux-plugins/tpm.git
        dest: "{{ home }}/.tmux/plugins/tpm"

    - name: Link dotfiles
      file:
        src: "{{ dotfiles }}/tmux/{{ item }}"
        dest: "{{ home }}/.{{ item }}"
        state: link
        force: yes
      with_items:
        - tmux.conf
        - tmux.battery.sh
      tags:
        - dotfiles

- name: WeeChat
  hosts: localhost
  gather_facts: no
  tags: weechat

  tasks:
    - name: Install WeeChat
      homebrew:
        name: weechat
        install_options: with-aspell,with-perl,with-python,with-ruby
        state: latest

    # The terminal-notifier gem is installed in a Ruby play.

    # The weechat gem is installed in a Ruby play.

    # This is done here because it uses Homebrew's Python.
    - name: Install pync
      pip:
        name: pync
        executable: /usr/local/bin/pip2
        extra_args: --user
        state: latest

    - name: Link dotfiles
      file:
        src: "{{ dotfiles }}/{{ item }}"
        dest: "{{ home }}/.{{ item }}"
        state: link
        force: yes
      with_items:
        - weechat
      tags:
        - dotfiles

- name: SSH
  hosts: localhost
  gather_facts: no
  tags: ssh

  tasks:
    - name: Link dotfiles
      file:
        src: "{{ dotfiles }}/{{ item }}"
        dest: "{{ home }}/.{{ item }}"
        state: link
        force: yes
      with_items:
        - ssh/config

- name: npm
  hosts: localhost
  gather_facts: no
  tags: npm

  tasks:
    - name: Install npm
      homebrew:
        name: node
        state: latest

- name: Install MongoDB
  hosts: localhost
  gather_facts: no
  tags: mongodb

  tasks:
    - name: Install MongoDB
      homebrew:
        name: mongodb
        state: latest

    - name: Install MongoDB Shell Enhancements
      npm:
        name: mongo-hacker
        global: yes
        state: latest
