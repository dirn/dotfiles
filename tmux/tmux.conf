# Remap prefix to <C-a>
set-option -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

# Vim all the things
set-option -g status-keys vi
set-window-option -g mode-keys vi
set-window-option -g xterm-keys on

# Make the splits behave like Vim's
unbind-key %
bind-key s split-window -v
bind-key v split-window -h

# Move around panes like Vim
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key H swap-pane -U
bind-key L swap-pane -D

# Resize panes like Vim
bind-key > resize-pane -L 5
bind-key < resize-pane -R 5
bind-key + resize-pane -U 5
bind-key - resize-pane -D 5

# Turn off escape delay
set-option -sg escape-time 0

# Resource the config
unbind-key r
bind-key r source-file ~/.tmux.conf \; display 'Resourced ~/.tmux.conf'

# Left-most tab should be the left-most key
set-option -g base-index 1
set-option -g pane-base-index 1

set-option -g default-terminal "screen-256color"
set-window-option -g utf8 on
set-window-option -g automatic-rename on

# Tick tock
set-window-option -g clock-mode-colour cyan
set-window-option -g clock-mode-style 24

# Fix the mouse
set-window-option -g mode-mouse on
set-option -g mouse-resize-pane on
set-option -g mouse-select-pane on
set-option -g mouse-select-window on

# Powerline
source-file ~/.vim/bundle/powerline/powerline/bindings/tmux/powerline.conf

# Copy/paste
bind-key -t vi-copy v begin-selection
bind-key -t vi-copy y copy-pipe "reattach-to-user-namespace pbcopy"
set-option -g default-command "reattach-to-user-namespace -l $SHELL -l"
bind-key P run-shell "tmux set-buffer \"$(pbpaste)\"; tmux paste-buffer"

set-option -g history-limit 50000

bind-key o choose-session
